<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bag Vault v2</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head><body>
<header><h1>🎯 Bag Vault</h1><div id="stats"></div></header>
<div class="wrap">
<div class="card">
<h2 id="formTitle">Add Bag</h2>
<input id="brand" placeholder="Brand">
<input id="series" placeholder="Series">
<input id="colorway" placeholder="Colorway">
<input id="speed" placeholder="Speed (5/8)">
<input id="value" type="number" placeholder="Estimated Value">
<select id="status"><option>Keep</option><option>Sell</option><option>Sold</option><option>Loaned</option></select>
<textarea id="notes" placeholder="Notes"></textarea>
<button id="saveBtn">Save Bag</button>
</div>
<div class="card">
<input id="search" placeholder="Search...">
<div id="list"></div>
</div></div>
<script src="app.js"></script></body></html>
